name: Regenerate Dashboard

on:
  schedule:
    - cron: "0 * * * *"       # stündlich
  repository_dispatch:
    types: [activity-uploaded]
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Generate dashboard
        if: true
        env:
          INTERVALS_API_KEY:    ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          TZ: Europe/Berlin
        run: python generate.py

      - name: Commit generated files
        if: ${{ github.event.inputs.debug_pace_api != 'true' && github.event.inputs.debug_wellness != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: regenerate dashboard [skip ci]"
          git push
