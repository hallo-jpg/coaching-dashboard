<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1f2d"/><stop offset="100%" stop-color="#080c0e"/>
    </linearGradient>
    <linearGradient id="peak" x1="256" y1="80" x2="256" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8f4f8"/><stop offset="60%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#4a6270"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Mountain outline with vertical gradient -->
  <polyline points="92,400 256,80 420,400" fill="none" stroke="url(#peak)" stroke-width="22" stroke-linejoin="round"/>
  <!-- Snow cap -->
  <polyline points="218,152 256,80 294,152" fill="none" stroke="#e8f4f8" stroke-width="22" stroke-linejoin="round"/>
  <!-- Baseline -->
  <line x1="92" y1="400" x2="420" y2="400" stroke="#1c2830" stroke-width="8" stroke-linecap="round"/>
</svg>
