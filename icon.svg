<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="115" fill="#0a0a0a"/>
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e1428"/>
      <stop offset="100%" stop-color="#160e2a"/>
    </linearGradient>
  </defs>
  <!-- Outer ring arc (CTL) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#1c1c1c" stroke-width="28"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#4f8ef7" stroke-width="28"
    stroke-linecap="round" stroke-dasharray="502" stroke-dashoffset="251"
    transform="rotate(-90 256 256)"/>
  <!-- Inner ring arc (ATL) -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="#1c1c1c" stroke-width="24"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#9b7fe8" stroke-width="24"
    stroke-linecap="round" stroke-dasharray="346" stroke-dashoffset="200"
    transform="rotate(-90 256 256)"/>
  <!-- Center: medal emoji substitute — TSB text -->
  <text x="256" y="248" text-anchor="middle" font-family="-apple-system, sans-serif"
    font-size="56" font-weight="900" fill="#3ecf8e">+20</text>
  <text x="256" y="290" text-anchor="middle" font-family="-apple-system, sans-serif"
    font-size="28" font-weight="700" fill="#444" letter-spacing="3">TSB</text>
</svg>
